<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartClass - Unified POC</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <!-- Sidebar (Hidden on Mobile, Visible on Tablet/Desktop) -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon material-symbols-outlined">box</span>
                <span class="logo-text">Doubt Box</span>
            </div>
            
            <nav class="nav-group">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="lessons">
                    <span class="material-symbols-outlined">school</span>
                    <span class="nav-label">Lessons</span>
                </a>
                <a href="#" class="nav-item" data-view="doubt">
                    <span class="material-symbols-outlined">help_center</span>
                    <span class="nav-label">Ask Doubt</span>
                </a>
                <a href="#" class="nav-item" data-view="walkthrough">
                    <span class="material-symbols-outlined">info</span>
                    <span class="nav-label">How it Works</span>
                </a>
            </nav>

            <div style="margin-top: auto; width: 100%;">
                <p class="admin-label">Admin View</p>
                <nav class="nav-group">
                    <a href="#" class="nav-item" data-view="teacher">
                        <span class="material-symbols-outlined">analytics</span>
                        <span class="nav-label">Teacher Panel</span>
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Bottom Nav for Mobile -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-view="dashboard">
                <span class="material-symbols-outlined">dashboard</span>
            </a>
            <a href="#" class="nav-item" data-view="lessons">
                <span class="material-symbols-outlined">school</span>
            </a>
            <a href="#" class="nav-item" data-view="doubt">
                <span class="material-symbols-outlined">help_center</span>
            </a>
            <a href="#" class="nav-item" data-view="teacher">
                <span class="material-symbols-outlined">analytics</span>
            </a>
        </nav>

        <main class="main-content" id="main-content">
            <!-- Content will be injected here by app.js -->
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
