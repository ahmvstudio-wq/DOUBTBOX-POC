<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartClass - Unified POC</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="logo">SmartClass</div>
            
            <nav class="nav-group">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <span class="material-symbols-outlined">dashboard</span>
                    Dashboard
                </a>
                <a href="#" class="nav-item" data-view="lessons">
                    <span class="material-symbols-outlined">school</span>
                    Lessons
                </a>
                <a href="#" class="nav-item" data-view="doubt">
                    <span class="material-symbols-outlined">help_center</span>
                    Ask Doubt
                </a>
            </nav>

            <div style="margin-top: auto;">
                <p class="text-muted" style="font-size: 11px; margin-bottom: 12px; padding-left: 16px; text-transform: uppercase; letter-spacing: 1px;">Admin View</p>
                <nav class="nav-group">
                    <a href="#" class="nav-item" data-view="teacher">
                        <span class="material-symbols-outlined">analytics</span>
                        Teacher Panel
                    </a>
                </nav>
            </div>
        </aside>

        <main class="main-content" id="main-content">
            <!-- Content will be injected here by app.js -->
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
